name: aqar
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  dartz: ^0.10.1
  dio: ^5.9.2
  equatable: ^2.0.8
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_localizations:
    sdk: flutter
  flutter_secure_storage: ^10.0.0
  flutter_web_plugins:
    sdk: flutter
  get_it: ^9.2.1
  injectable: ^2.7.1
  internet_connection_checker: ^3.0.1
  pretty_dio_logger: ^1.4.0
  shared_preferences: ^2.5.5
  share_plus: ^13.1.0
  permission_handler: ^12.0.3
  geolocator: ^14.0.3
  url_launcher: ^6.3.0
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  webview_flutter: ^4.10.0
  webview_flutter_android: ^4.0.0
  webview_flutter_wkwebview: ^3.25.1
  webview_flutter_web: ^0.2.3
  app_links: ^6.3.2
  device_info_plus: ^13.1.0
  image_picker: ^1.1.0
  intl: ^0.20.2
  lottie: ^3.1.4
  socket_io_client: ^2.0.3+1
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.1
  local_auth: ^3.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.9
  injectable_generator: ^2.12.0
  mockito: ^5.4.4
  bloc_test: ^10.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/aqar.png"
  adaptive_icon_background: "#FCF8F0"
  adaptive_icon_foreground: "assets/icons/aqar.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  
  assets:
    - assets/
    - assets/icons/